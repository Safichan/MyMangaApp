<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styling.css">
    <title>Manga App</title>
</head>
<body>
    <div class="topbar">
        <button class="account-button">Account</button>
    </div>

    <h1>My Manga App</h1>

    <div class="search-container">
        <input type="search" placeholder="Manga eingeben">
        <button>Search</button>
        <div class="search-results">
            <div class="result-item">
                <img class="result-img" src="images/EnsembleStarsPoster.jpg" alt="Ensemble Stars">
                <a class="result-item-title">Ensemble Stars</a>
                <div class="result-item-button-container">
                    <button>Add to Wishlist</button>
                </div>
            </div>
            <div class="result-item">
                <img class="result-img" src="images/InazumaElevenPoster.jpg" alt="Inazuma Eleven">
                <a class="result-item-title">Inazuma Eleven</a>
                <div class="result-item-button-container">
                    <button>Add to Wishlist</button>
                </div>
            </div>
        </div>
    </div>


    <h1>Wishlist</h1>

    <div class="search-container">
        <div class="search-results">
            <div class="result-item">
                <img class="result-img" src="images/EnsembleStarsPoster.jpg" alt="Ensemble Stars">
                <a class="result-item-title">Ensemble Stars</a>
                <div class="result-item-button-container">
                    <button>Add next volume</button>
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>
            <div class="result-item">
                <img class="result-img" src="images/InazumaElevenPoster.jpg" alt="Inazuma Eleven">
                <a class="result-item-title">Inazuma Eleven</a>
                <div class="result-item-button-container">
                    <button>Add next volume</button>
                    <button>Edit</button>
                    <button>Delete</button>
                </div>
            </div>
        </div>
    </div>

    <button>To overview</button>

    </div>
    
</body>
</html>
